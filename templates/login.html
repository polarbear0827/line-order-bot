<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — 點餐系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; min-height: 100vh;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 60%, #0F4C81 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-wrap { width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .emoji { font-size: 52px; display: block; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,.4)); }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: #fff; }
    .login-logo p  { font-size: 13px; color: #94A3B8; margin-top: 4px; }
    .login-card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(16px);
      border-radius: 16px; padding: 36px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 40px rgba(0,0,0,.3);
    }
    .form-label {
      display: block; font-size: 11px; font-weight: 600; color: #94A3B8;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
    }
    .form-control {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; font-size: 14px; font-family: inherit; color: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control::placeholder { color: #475569; }
    .form-control:focus { outline: none; border-color: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,.2); }
    .form-group { margin-bottom: 16px; }
    .btn-login {
      width: 100%; padding: 13px; background: #F59E0B; color: #0F172A;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: background .15s, transform .1s;
    }
    .btn-login:hover { background: #D97706; }
    .btn-login:active { transform: scale(0.98); }
    .alert-box {
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
    }
    .alert-error   { background: rgba(239,68,68,.15);  color: #FCA5A5; border: 1px solid rgba(239,68,68,.3); }
    .alert-warning { background: rgba(245,158,11,.15); color: #FCD34D; border: 1px solid rgba(245,158,11,.3); }
    .alert-success { background: rgba(16,185,129,.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,.3); }
    .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #475569; }

    /* 角色提示 */
    .role-hints { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
    .role-hint { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
                 border-radius: 8px; padding: 10px 6px; text-align: center; }
    .role-hint .icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .role-hint .label { font-size: 10px; color: #64748B; }
    .role-hint .acc { font-size: 11px; color: #94A3B8; font-family: monospace; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="emoji">🍱</span>
      <h1>消防局點餐系統</h1>
      <p>請輸入你的帳號和密碼</p>
    </div>

    <div class="login-card">
      {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <div class="alert-box alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}

      <!-- 角色提示 -->
      <div class="role-hints">
        <div class="role-hint">
          <span class="icon">👑</span>
          <div class="label">Provider</div>
          <div class="acc">polarbear268</div>
        </div>
        <div class="role-hint">
          <span class="icon">🧑‍💼</span>
          <div class="label">Admin</div>
          <div class="acc">admin001…</div>
        </div>
        <div class="role-hint">
          <span class="icon">🧑‍🚒</span>
          <div class="label">User</div>
          <div class="acc">user001…</div>
        </div>
      </div>

      <form method="POST" id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">帳號</label>
          <input type="text" name="username" id="username" class="form-control"
                 placeholder="輸入帳號" autofocus required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">密碼</label>
          <input type="password" name="password" id="password" class="form-control"
                 placeholder="輸入密碼" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">登入</button>
      </form>
    </div>
    <p class="footer">僅限授權人員使用 · 連續錯誤將封鎖 IP</p>
  </div>
</body>
</html>
