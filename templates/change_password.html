{% extends "base.html" %}
{% block title %}修改密碼{% endblock %}
{% block page_title %}🔐 修改密碼{% endblock %}

{% block content %}
<div style="max-width:440px; margin:40px auto;">
  <div class="card" style="padding:32px;">
    {% if user.must_change_pw %}
    <div class="alert alert-warning" style="margin-bottom:20px;">
      ⚠️ 請先修改初始密碼後再使用系統
    </div>
    {% endif %}

    <p style="font-size:14px; color:#475569; margin-bottom:24px;">
      密碼規則：4–8 位，英文或數字皆可（例如：<code>1234</code>、<code>abc8</code>）
    </p>

    <form method="POST">
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:12px; font-weight:600; color:#64748B; margin-bottom:6px;">目前密碼</label>
        <input type="password" name="old_password" class="form-control" placeholder="輸入目前使用的密碼" required autocomplete="current-password">
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:12px; font-weight:600; color:#64748B; margin-bottom:6px;">新密碼</label>
        <input type="password" name="new_password" id="new_pw" class="form-control" placeholder="4–8 位英文或數字" required autocomplete="new-password">
      </div>
      <div style="margin-bottom:24px;">
        <label style="display:block; font-size:12px; font-weight:600; color:#64748B; margin-bottom:6px;">確認新密碼</label>
        <input type="password" name="confirm_password" id="confirm_pw" class="form-control" placeholder="再輸入一次新密碼" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">確認修改</button>
      {% if not user.must_change_pw %}
      <a href="{{ url_for('user_portal') if user.role == 'user' else url_for('dashboard') }}"
         class="btn btn-secondary" style="width:100%; margin-top:10px; text-align:center; display:block;">
        取消
      </a>
      {% endif %}
    </form>
  </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const np = document.getElementById('new_pw').value;
  const cp = document.getElementById('confirm_pw').value;
  if (np !== cp) {
    e.preventDefault();
    alert('兩次密碼不一致，請重新輸入');
  }
  if (np.length < 4 || np.length > 8) {
    e.preventDefault();
    alert('密碼需為 4–8 位');
  }
});
</script>
{% endblock %}
