version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data          # SQLite 資料庫持久化
      - ./static:/app/static      # 上傳的圖片持久化
    env_file:
      - .env
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge
